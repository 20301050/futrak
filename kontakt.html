  <div class="kontakt-page">
    <div class="page-logo">FUTRAK</div>
    <h1>KONTAKT</h1>
    <p class="kontakt-subtitle">Napisz do nas</p>

    <form class="kontakt-form" action="https://formspree.io/f/TONCODE" method="POST">
      <div class="form-group">
        <label for="name">Imię i nazwisko</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">Wiadomość</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn-submit">WYŚLIJ</button>
    </form>
  </div>
