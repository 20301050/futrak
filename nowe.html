<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUTRAK - Nowe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-top">
      <span class="menu-icon">☰</span>
      <a href="index.html" class="nav-logo" style="text-decoration:none;color:#3E2723;">FUTRAK</a>
      <div>
        <span class="nav-icon">🔍</span>
        <span class="nav-icon">♡</span>
        <span class="nav-icon">🛒</span>
      </div>
    </div>
    <div class="nav-bottom">
      <a href="index.html">ACCUEIL</a>
      <a href="nowe.html">NOWE</a>
      <a href="czapki.html">CZAPKI</a>
      <a href="futro.html">FUTRO</a>
      <a href="ski.html">SKI</a>
      <a href="torebki.html">TOREBKI</a>
      <a href="historia.html">HISTORIA</a>
      <a href="kontakt.html">KONTAKT</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>NOWE</h1>
    <div class="header-line"></div>
  </div>

  <section class="products-grid">
    <div class="product-card">
      <img src="20.jpeg" alt="Nowe 1" onerror="this.style.background='#b8d4e8'">
      <div class="product-name">Nowe 1</div>
      <div class="product-price">450 zł</div>
      <button class="btn-add">DODAJ DO KOSZYKA</button>
    </div>
    <div class="product-card">
      <img src="21.jpeg" alt="Nowe 2" onerror="this.style.background='#b8d4e8'">
      <div class="product-name">Nowe 2</div>
      <div class="product-price">680 zł</div>
      <button class="btn-add">DODAJ DO KOSZYKA</button>
    </div>
    <div class="product-card">
      <img src="22.jpeg" alt="Nowe 3" onerror="this.style.background='#b8d4e8'">
      <div class="product-name">Nowe 3</div>
      <div class="product-price">290 zł</div>
      <button class="btn-add">DODAJ DO KOSZYKA</button>
    </div>
    <div class="product-card">
      <img src="23.jpeg" alt="Nowe 4" onerror="this.style.background='#b8d4e8'">
      <div class="product-name">Nowe 4</div>
      <div class="product-price">520 zł</div>
      <button class="btn-add">DODAJ DO KOSZYKA</button>
    </div>
  </section>

  <footer>
    <div class="footer-logo">FUTRAK</div>
    <div class="footer-links">
      <a href="nowe.html">Nowe</a>
      <a href="futro.html">Futro</a>
      <a href="ski.html">Ski</a>
      <a href="torebki.html">Torebki</a>
      <a href="historia.html">Historia</a>
      <a href="kontakt.html">Kontakt</a>
    </div>
    <div class="footer-line"></div>
    <div class="footer-copy">© 2025 FUTRAK · Polska · Futra Luksusowe</div>
  </footer>
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">×</span>
    <img id="lightbox-img" src="" alt="">
  </div>
  <script>
    function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('active'); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
    document.querySelectorAll('.product-card img').forEach(img => { img.addEventListener('click', () => openLightbox(img.src)); });
  </script>
</body>
</html>
